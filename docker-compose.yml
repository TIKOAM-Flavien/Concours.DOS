services:
  portail:
    build:
      context: .
      secrets:
        - vite_build_env
    image: portail-entreprise-dev:latest
    container_name: portail-entreprise-dev
    restart: unless-stopped
    # Host port 3002 (3001 is already used on the host). The container listens
    # on 3002 internally too, so a reverse proxy (NPM/Traefik/nginx) reaching
    # the container by its docker DNS name can target `portail-entreprise-dev:3002`.
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: "3002"
      PORTAL_ADMIN_DB_PATH: /data/admin.db
      PORTAL_UPLOAD_STAGING_DIR: /data/uploads
      # The proxy (NPM) terminates TLS and forwards over the docker bridge
      # network. `uniquelocal` trusts loopback + RFC1918 hops, which lets
      # Express expose the real client IP via X-Forwarded-For.
      TRUST_PROXY: "uniquelocal"
      # Public URL used to mint signed `/depot` invitation links. Must match
      # what NPM serves to the outside world.
      CLIENT_PORTAL_PUBLIC_URL: "https://concoursdev.bebou2bebou.fr/depot"
      # Comma-separated list of IPv4 / CIDR clients allowed to reach /admin
      # and /api/admin* via the proxy. Loopback (127.0.0.1, ::1) is always
      # allowed. Set this in `.env.production` so it stays out of git.
      # PORTAL_ADMIN_ALLOWED_IPS: "203.0.113.10,198.51.100.0/24"
    env_file:
      # Holds secrets/integration URLs (PORTAL_LINK_SECRET, Power Automate
      # webhooks, PORTAL_ADMIN_ALLOWED_IPS, ...). Optional so `docker compose
      # up` still starts if you haven't created it yet, but the server will
      # refuse to serve until PORTAL_LINK_SECRET + Power Automate URLs are
      # configured (see /readyz).
      - path: .env.production
        required: false
    volumes:
      - portail_data:/data
    # Uncomment and rename to attach the container to your existing nginx
    # proxy network. With the default Docker bridge + the `ports:` mapping
    # above, NPM can also forward to `host.docker.internal:3002` or
    # `<docker-host-ip>:3002` if it lives on a different network.
    # networks:
    #   - default
    #   - proxy

# networks:
#   proxy:
#     external: true
#     name: nginxproxymanager_default

secrets:
  vite_build_env:
    # Build-time only (Vite). Contains the public VITE_* branding variables.
    # Copy `docker-build.env.example` to `.env.vite.build`, fill it in, then
    # `docker compose build`. Never commit this file.
    file: .env.vite.build

volumes:
  portail_data:
